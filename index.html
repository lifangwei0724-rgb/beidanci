<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="format-detection" content="telephone=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>背单词 - 18讲</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
            min-height: 100vh;
            padding-bottom: 80px;
        }
        .header {
            background: linear-gradient(135deg, #07c160 0%, #05a350 100%);
            padding: 40px 20px 25px;
            text-align: center;
            color: white;
            position: relative;
        }
        .header h1 { font-size: 26px; margin-bottom: 6px; }
        .header p { font-size: 14px; opacity: 0.9; }
        .header-back {
            position: absolute;
            left: 15px;
            top: 42px;
            background: none;
            border: none;
            color: white;
            font-size: 22px;
            cursor: pointer;
            padding: 5px;
            display: none;
        }
        .stats-bar {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: 15px;
        }
        .stat-item { text-align: center; }
        .stat-value { font-size: 22px; font-weight: bold; }
        .stat-label { font-size: 12px; opacity: 0.9; }

        .card {
            background: white;
            margin: 12px 15px;
            border-radius: 12px;
            padding: 18px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }

        /* 课程列表页 */
        .lecture-list { padding: 5px 0; }
        .lecture-item {
            display: flex;
            align-items: center;
            padding: 16px;
            border-bottom: 1px solid #f0f0f0;
            cursor: pointer;
            transition: background 0.2s;
        }
        .lecture-item:active { background: #f8f8f8; }
        .lecture-item:last-child { border-bottom: none; }
        .lecture-num {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, #07c160 0%, #05a350 100%);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 16px;
            flex-shrink: 0;
        }
        .lecture-num.empty {
            background: #e0e0e0;
            color: #999;
        }
        .lecture-num.completed {
            background: linear-gradient(135deg, #ffc107 0%, #ff9800 100%);
        }
        .lecture-info {
            flex: 1;
            margin-left: 14px;
        }
        .lecture-title {
            font-size: 16px;
            font-weight: 500;
            color: #333;
            margin-bottom: 4px;
        }
        .lecture-desc {
            font-size: 13px;
            color: #999;
        }
        .lecture-progress {
            width: 50px;
            text-align: right;
        }
        .lecture-progress-bar {
            width: 50px;
            height: 4px;
            background: #f0f0f0;
            border-radius: 2px;
            overflow: hidden;
            margin-bottom: 4px;
        }
        .lecture-progress-fill {
            height: 100%;
            background: #07c160;
            border-radius: 2px;
            transition: width 0.3s;
        }
        .lecture-progress-text {
            font-size: 11px;
            color: #999;
        }
        .lecture-arrow {
            color: #ccc;
            font-size: 18px;
            margin-left: 8px;
        }

        /* 学习页 */
        .word-card {
            text-align: center;
            padding: 25px 0;
        }
        .word-text {
            font-size: 30px;
            font-weight: bold;
            color: #333;
            margin-bottom: 10px;
        }
        .word-meaning {
            font-size: 20px;
            color: #07c160;
            margin-bottom: 20px;
            min-height: 30px;
        }
        .word-meaning.hidden-meaning {
            color: #ddd;
            background: #f5f5f5;
            padding: 8px 20px;
            border-radius: 8px;
            display: inline-block;
        }
        .word-counter {
            font-size: 13px;
            color: #999;
            margin-bottom: 15px;
        }

        .btn-group {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }
        .btn {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
        }
        .btn-primary { background: #07c160; color: white; }
        .btn-secondary { background: #f2f2f2; color: #666; }
        .btn-danger { background: #fa5151; color: white; }
        .btn-full { width: 100%; margin-bottom: 10px; }

        .mode-tabs {
            display: flex;
            background: #f2f2f2;
            border-radius: 8px;
            padding: 3px;
            margin-bottom: 18px;
        }
        .mode-tab {
            flex: 1;
            padding: 10px;
            border: none;
            background: transparent;
            color: #666;
            font-size: 14px;
            border-radius: 6px;
            cursor: pointer;
        }
        .mode-tab.active {
            background: white;
            color: #07c160;
            font-weight: 500;
        }

        .section-title {
            font-size: 16px;
            font-weight: 600;
            color: #333;
            margin-bottom: 15px;
            padding-left: 10px;
            border-left: 3px solid #07c160;
        }

        .word-list {
            max-height: 350px;
            overflow-y: auto;
        }
        .word-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px;
            border-bottom: 1px solid #f0f0f0;
        }
        .word-item:last-child { border-bottom: none; }
        .word-info h4 { font-size: 15px; color: #333; margin-bottom: 3px; }
        .word-info p { font-size: 13px; color: #999; }
        .word-status {
            width: 22px;
            height: 22px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
        }
        .word-status.learned { background: #07c160; color: white; }
        .word-status.new { background: #f0f0f0; color: #999; }

        .test-option {
            padding: 15px;
            margin-bottom: 10px;
            border: 1px solid #e5e5e5;
            border-radius: 8px;
            background: white;
            font-size: 16px;
            text-align: left;
            cursor: pointer;
        }
        .test-option:active { background: #f8f8f8; }
        .test-option.correct { border-color: #07c160; background: #e8f8f0; }
        .test-option.wrong { border-color: #fa5151; background: #ffe8e8; }

        .result-score {
            font-size: 60px;
            font-weight: bold;
            color: #07c160;
            text-align: center;
            margin: 20px 0;
        }

        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: white;
            display: flex;
            border-top: 1px solid #e5e5e5;
            padding-bottom: env(safe-area-inset-bottom);
            z-index: 100;
        }
        .nav-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 8px;
            border: none;
            background: white;
            color: #999;
            font-size: 11px;
            cursor: pointer;
        }
        .nav-item.active { color: #07c160; }
        .nav-icon { font-size: 22px; margin-bottom: 2px; }

        .hidden { display: none !important; }

        .toast {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 15px 30px;
            border-radius: 8px;
            font-size: 14px;
            z-index: 1000;
            display: none;
        }
        .toast.show { display: block; }

        .achievements {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }
        .achievement {
            aspect-ratio: 1;
            background: #f5f5f5;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            opacity: 0.3;
        }
        .achievement.unlocked {
            opacity: 1;
            background: linear-gradient(135deg, #07c160 0%, #05a350 100%);
        }

        .overall-progress {
            background: white;
            margin: 12px 15px;
            border-radius: 12px;
            padding: 16px 18px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .overall-bar {
            flex: 1;
            height: 8px;
            background: #f0f0f0;
            border-radius: 4px;
            overflow: hidden;
        }
        .overall-fill {
            height: 100%;
            background: linear-gradient(90deg, #07c160, #05d66e);
            border-radius: 4px;
            transition: width 0.5s;
        }
        .overall-text {
            font-size: 13px;
            color: #666;
            white-space: nowrap;
        }

        .reset-btn {
            display: block;
            margin: 15px auto;
            padding: 10px 20px;
            background: none;
            border: 1px solid #ddd;
            border-radius: 8px;
            color: #999;
            font-size: 13px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="header">
        <button class="header-back" id="backBtn" onclick="goBackToLectures()">&#8592;</button>
        <h1 id="headerTitle">背单词</h1>
        <p id="headerDesc">共18讲 - 选择课程开始学习</p>
        <div class="stats-bar">
            <div class="stat-item">
                <div class="stat-value" id="points">0</div>
                <div class="stat-label">积分</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="streak">0</div>
                <div class="stat-label">连击</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="learned">0</div>
                <div class="stat-label">已学</div>
            </div>
        </div>
    </div>

    <!-- 课程列表页 -->
    <div id="page-courses">
        <div class="overall-progress">
            <div class="overall-text" id="overallText">总进度 0%</div>
            <div class="overall-bar">
                <div class="overall-fill" id="overallFill" style="width:0%"></div>
            </div>
        </div>
        <div class="card">
            <div class="section-title">选择课程</div>
            <div class="lecture-list" id="lectureList"></div>
        </div>
    </div>

    <!-- 学习页 -->
    <div id="page-learn" class="hidden">
        <div class="card">
            <div class="mode-tabs">
                <button class="mode-tab active" onclick="setMode('new')">新单词</button>
                <button class="mode-tab" onclick="setMode('review')">复习</button>
            </div>
            <div class="word-card">
                <div class="word-counter" id="wordCounter"></div>
                <div class="word-text" id="wordText">Welcome</div>
                <div class="word-meaning hidden-meaning" id="wordMeaning">点击显示释义</div>
            </div>
            <div class="btn-group">
                <button class="btn btn-secondary" id="showBtn" onclick="showMeaning()">显示释义</button>
                <button class="btn btn-danger hidden" id="unknowBtn" onclick="markUnknown()">不认识</button>
                <button class="btn btn-primary hidden" id="knowBtn" onclick="markKnown()">认识</button>
            </div>
        </div>
        <div class="card">
            <div class="section-title">本讲单词</div>
            <div class="word-list" id="lectureWordList"></div>
        </div>
    </div>

    <!-- 测试页 -->
    <div id="page-test" class="hidden">
        <div class="card">
            <div id="test-start">
                <div class="section-title">选择测试模式</div>
                <button class="btn btn-primary btn-full" onclick="startTest('choice')">看词选义</button>
                <button class="btn btn-primary btn-full" onclick="startTest('chinese')">看义选词</button>
                <button class="btn btn-primary btn-full" onclick="startTest('spell')">拼写测试</button>
            </div>
            <div id="test-content" class="hidden"></div>
        </div>
    </div>

    <!-- 统计页 -->
    <div id="page-stats" class="hidden">
        <div class="card">
            <div class="section-title">成就徽章</div>
            <div class="achievements" id="achievements"></div>
        </div>
        <div class="card">
            <div class="section-title">全部单词</div>
            <div class="word-list" id="wordList"></div>
        </div>
        <button class="reset-btn" onclick="resetProgress()">重置学习进度</button>
    </div>

    <div class="bottom-nav">
        <button class="nav-item active" id="nav-courses" onclick="showPage('courses', this)">
            <span class="nav-icon">📋</span>
            <span>课程</span>
        </button>
        <button class="nav-item" id="nav-test" onclick="showPage('test', this)">
            <span class="nav-icon">📝</span>
            <span>测试</span>
        </button>
        <button class="nav-item" id="nav-stats" onclick="showPage('stats', this)">
            <span class="nav-icon">📊</span>
            <span>统计</span>
        </button>
    </div>

    <div id="toast" class="toast"></div>

    <script>
        // ==================== 18讲词汇数据 ====================
        const lectures = [
            {
                id: 1,
                title: "Camping Adventure",
                words: [
                    {word: "go camping", meaning: "去露营"},
                    {word: "put it up", meaning: "把……搭起来"},
                    {word: "get some water", meaning: "取水"},
                    {word: "milk the cows", meaning: "挤奶牛"},
                    {word: "come and watch", meaning: "过来看"},
                    {word: "go to bed", meaning: "去睡觉"},
                    {word: "get up", meaning: "起床"},
                    {word: "blow the tent down", meaning: "把帐篷吹倒"},
                    {word: "get in the car", meaning: "进入车里"},
                    {word: "get worse", meaning: "变得更糟"},
                    {word: "get past", meaning: "路过"},
                    {word: "go back to the house", meaning: "回到房子里"},
                    {word: "call for help", meaning: "寻求帮助"},
                    {word: "make a big cross", meaning: "做一个十字"},
                    {word: "run to", meaning: "跑向"},
                    {word: "come to the door", meaning: "来到门口"},
                    {word: "like camping", meaning: "喜欢露营"},
                    {word: "at last", meaning: "最后"},
                    {word: "make out of", meaning: "由...做成"},
                    {word: "buy sb. sth.", meaning: "给某人买某物"},
                    {word: "buy sth. for sb.", meaning: "给某人买某物"}
                ]
            },
            { id: 2, title: "第2讲", words: [] },
            { id: 3, title: "第3讲", words: [] },
            { id: 4, title: "第4讲", words: [] },
            { id: 5, title: "第5讲", words: [] },
            { id: 6, title: "第6讲", words: [] },
            { id: 7, title: "第7讲", words: [] },
            { id: 8, title: "第8讲", words: [] },
            { id: 9, title: "第9讲", words: [] },
            { id: 10, title: "第10讲", words: [] },
            { id: 11, title: "第11讲", words: [] },
            { id: 12, title: "第12讲", words: [] },
            { id: 13, title: "第13讲", words: [] },
            { id: 14, title: "第14讲", words: [] },
            { id: 15, title: "第15讲", words: [] },
            { id: 16, title: "第16讲", words: [] },
            { id: 17, title: "第17讲", words: [] },
            { id: 18, title: "第18讲", words: [] }
        ];

        // ==================== 全局状态 ====================
        let allWords = {};       // lectureId -> [{word, meaning, learned, level, nextReview, id}]
        let currentLecture = null;
        let words = [];          // 当前讲的单词
        let currentMode = 'new';
        let currentIndex = 0;
        let currentTest = null;

        let userData = {
            points: 0,
            streak: 0,
            lastStudyDate: null,
            achievements: []
        };

        const achievementList = [
            {id: 'first', icon: '🌱', name: '初学者'},
            {id: 'ten', icon: '📚', name: '积累10个'},
            {id: 'fifty', icon: '🏆', name: '积累50个'},
            {id: 'hundred', icon: '👑', name: '积累100个'},
            {id: 'streak3', icon: '🔥', name: '3天连击'},
            {id: 'streak7', icon: '🗓️', name: '7天连击'},
            {id: 'perfect', icon: '💯', name: '满分'},
            {id: 'allclear', icon: '⭐', name: '全部掌握'}
        ];

        // ==================== 初始化 ====================
        function init() {
            loadData();
            checkStreak();
            updateStats();
            renderLectureList();
            renderAchievements();
        }

        function loadData() {
            // 加载每讲的单词数据
            const saved = localStorage.getItem('bdc_allWords_v2');
            if (saved) {
                allWords = JSON.parse(saved);
            } else {
                allWords = {};
                lectures.forEach(lec => {
                    if (lec.words.length > 0) {
                        allWords[lec.id] = lec.words.map((w, i) => ({
                            id: lec.id * 1000 + i,
                            word: w.word,
                            meaning: w.meaning,
                            learned: false,
                            level: 0,
                            nextReview: null
                        }));
                    }
                });
                saveWords();
            }
            // 加载用户数据
            const savedUser = localStorage.getItem('bdc_userData_v2');
            if (savedUser) userData = JSON.parse(savedUser);
        }

        function saveWords() {
            localStorage.setItem('bdc_allWords_v2', JSON.stringify(allWords));
        }

        function saveUserData() {
            localStorage.setItem('bdc_userData_v2', JSON.stringify(userData));
        }

        function saveAll() {
            saveWords();
            saveUserData();
        }

        // ==================== 连击检查 ====================
        function checkStreak() {
            const today = new Date().toDateString();
            if (userData.lastStudyDate) {
                const last = new Date(userData.lastStudyDate);
                const diff = Math.floor((new Date() - last) / (1000 * 60 * 60 * 24));
                if (diff > 1) userData.streak = 0;
            }
            saveUserData();
        }

        // ==================== 统计更新 ====================
        function updateStats() {
            document.getElementById('points').textContent = userData.points;
            document.getElementById('streak').textContent = userData.streak;
            // 计算所有讲已学单词总数
            let totalLearned = 0;
            Object.values(allWords).forEach(ws => {
                totalLearned += ws.filter(w => w.learned).length;
            });
            document.getElementById('learned').textContent = totalLearned;
        }

        // ==================== 页面导航 ====================
        function showPage(page, navEl) {
            document.querySelectorAll('[id^="page-"]').forEach(p => p.classList.add('hidden'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));

            if (page === 'courses') {
                document.getElementById('page-courses').classList.remove('hidden');
                currentLecture = null;
                document.getElementById('headerTitle').textContent = '背单词';
                document.getElementById('headerDesc').textContent = '共18讲 - 选择课程开始学习';
                document.getElementById('backBtn').style.display = 'none';
                renderLectureList();
            } else if (page === 'test') {
                if (currentLecture) {
                    document.getElementById('page-test').classList.remove('hidden');
                } else {
                    showToast('请先选择一讲课程');
                    document.getElementById('page-courses').classList.remove('hidden');
                    document.getElementById('nav-courses').classList.add('active');
                    return;
                }
            } else if (page === 'stats') {
                document.getElementById('page-stats').classList.remove('hidden');
                renderAchievements();
                renderAllWordList();
            }

            if (navEl) navEl.classList.add('active');
        }

        function enterLecture(lecId) {
            const lec = lectures.find(l => l.id === lecId);
            if (!lec) return;

            if (!allWords[lecId] || allWords[lecId].length === 0) {
                showToast('该讲还没有词汇，等待添加');
                return;
            }

            currentLecture = lec;
            words = allWords[lecId];
            currentIndex = 0;
            currentMode = 'new';

            // 更新界面
            document.getElementById('headerTitle').textContent = '第' + lecId + '讲';
            document.getElementById('headerDesc').textContent = lec.title;
            document.getElementById('backBtn').style.display = 'block';

            document.querySelectorAll('[id^="page-"]').forEach(p => p.classList.add('hidden'));
            document.getElementById('page-learn').classList.remove('hidden');

            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));

            document.querySelectorAll('.mode-tab').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.mode-tab')[0].classList.add('active');

            // 重置测试
            document.getElementById('test-start').classList.remove('hidden');
            document.getElementById('test-content').classList.add('hidden');

            initLearn();
            renderLectureWordList();
        }

        function goBackToLectures() {
            showPage('courses', document.getElementById('nav-courses'));
        }

        // ==================== 课程列表渲染 ====================
        function renderLectureList() {
            const list = document.getElementById('lectureList');
            let html = '';
            let totalWords = 0;
            let totalLearned = 0;

            lectures.forEach(lec => {
                const ws = allWords[lec.id] || [];
                const count = ws.length;
                const learnedCount = ws.filter(w => w.learned).length;
                totalWords += count;
                totalLearned += learnedCount;
                const pct = count > 0 ? Math.round(learnedCount / count * 100) : 0;
                const isEmpty = count === 0;
                const isCompleted = count > 0 && learnedCount === count;

                html += `
                    <div class="lecture-item" onclick="enterLecture(${lec.id})">
                        <div class="lecture-num ${isEmpty ? 'empty' : (isCompleted ? 'completed' : '')}">${lec.id}</div>
                        <div class="lecture-info">
                            <div class="lecture-title">${lec.title}</div>
                            <div class="lecture-desc">${isEmpty ? '暂无词汇' : count + '个词组 · 已学' + learnedCount + '个'}</div>
                        </div>
                        ${!isEmpty ? `
                        <div class="lecture-progress">
                            <div class="lecture-progress-bar">
                                <div class="lecture-progress-fill" style="width:${pct}%"></div>
                            </div>
                            <div class="lecture-progress-text">${pct}%</div>
                        </div>` : ''}
                        <div class="lecture-arrow">&rsaquo;</div>
                    </div>
                `;
            });
            list.innerHTML = html;

            // 总进度
            const overallPct = totalWords > 0 ? Math.round(totalLearned / totalWords * 100) : 0;
            document.getElementById('overallText').textContent = '总进度 ' + overallPct + '%（' + totalLearned + '/' + totalWords + '）';
            document.getElementById('overallFill').style.width = overallPct + '%';
        }

        // ==================== 学习功能 ====================
        function setMode(mode) {
            currentMode = mode;
            document.querySelectorAll('.mode-tab').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            currentIndex = 0;
            initLearn();
        }

        function initLearn() {
            if (!currentLecture || !words) return;

            const list = currentMode === 'new'
                ? words.filter(w => !w.learned)
                : words.filter(w => w.nextReview && w.nextReview <= Date.now());

            if (list.length === 0) {
                document.getElementById('wordCounter').textContent = '';
                document.getElementById('wordText').textContent = currentMode === 'new' ? '本讲完成' : '暂无复习';
                document.getElementById('wordMeaning').textContent = currentMode === 'new' ? '所有单词已学习' : '当前没有需要复习的词';
                document.getElementById('wordMeaning').classList.remove('hidden-meaning');
                document.getElementById('showBtn').classList.add('hidden');
                document.getElementById('knowBtn').classList.add('hidden');
                document.getElementById('unknowBtn').classList.add('hidden');
                return;
            }

            const idx = currentIndex % list.length;
            const word = list[idx];
            document.getElementById('wordCounter').textContent = (idx + 1) + ' / ' + list.length;
            document.getElementById('wordText').textContent = word.word;
            document.getElementById('wordMeaning').textContent = '点击显示释义';
            document.getElementById('wordMeaning').classList.add('hidden-meaning');
            document.getElementById('showBtn').classList.remove('hidden');
            document.getElementById('knowBtn').classList.add('hidden');
            document.getElementById('unknowBtn').classList.add('hidden');
        }

        function showMeaning() {
            const list = currentMode === 'new'
                ? words.filter(w => !w.learned)
                : words.filter(w => w.nextReview && w.nextReview <= Date.now());
            if (list.length === 0) return;
            const word = list[currentIndex % list.length];
            document.getElementById('wordMeaning').textContent = word.meaning;
            document.getElementById('wordMeaning').classList.remove('hidden-meaning');
            document.getElementById('showBtn').classList.add('hidden');
            document.getElementById('knowBtn').classList.remove('hidden');
            document.getElementById('unknowBtn').classList.remove('hidden');
        }

        function markKnown() {
            const list = currentMode === 'new'
                ? words.filter(w => !w.learned)
                : words.filter(w => w.nextReview && w.nextReview <= Date.now());
            if (list.length === 0) return;
            const word = list[currentIndex % list.length];
            const today = new Date().toDateString();

            if (currentMode === 'new') {
                word.learned = true;
                word.level = 1;
                word.nextReview = Date.now() + 5 * 60 * 1000;
                addPoints(10, '学会新单词');
                if (userData.lastStudyDate !== today) {
                    userData.streak++;
                    userData.lastStudyDate = today;
                    showToast('🔥 ' + userData.streak + '天连击！');
                }
                checkLearningAchievements();
            } else {
                word.level = Math.min(word.level + 1, 7);
                const intervals = [5, 30, 720, 1440, 2880, 5760, 10080, 21600];
                word.nextReview = Date.now() + intervals[word.level] * 60 * 1000;
                addPoints(5, '复习成功');
            }
            saveAll();
            updateStats();
            currentIndex++;
            initLearn();
            renderLectureWordList();
        }

        function markUnknown() {
            const list = currentMode === 'new'
                ? words.filter(w => !w.learned)
                : words.filter(w => w.nextReview && w.nextReview <= Date.now());
            if (list.length === 0) return;
            const word = list[currentIndex % list.length];
            word.level = Math.max(word.level - 1, 0);
            word.nextReview = Date.now() + 5 * 60 * 1000;
            saveAll();
            showToast('加油，会再复习的');
            currentIndex++;
            initLearn();
        }

        function checkLearningAchievements() {
            let total = 0;
            Object.values(allWords).forEach(ws => {
                total += ws.filter(w => w.learned).length;
            });
            if (total >= 1) unlockAchievement('first');
            if (total >= 10) unlockAchievement('ten');
            if (total >= 50) unlockAchievement('fifty');
            if (total >= 100) unlockAchievement('hundred');
            if (userData.streak >= 3) unlockAchievement('streak3');
            if (userData.streak >= 7) unlockAchievement('streak7');

            // 检查当前讲是否全部掌握
            if (currentLecture && words.length > 0 && words.every(w => w.learned)) {
                unlockAchievement('allclear');
            }
        }

        // ==================== 本讲单词列表 ====================
        function renderLectureWordList() {
            if (!words) return;
            document.getElementById('lectureWordList').innerHTML = words.map(w => `
                <div class="word-item">
                    <div class="word-info">
                        <h4>${w.word}</h4>
                        <p>${w.meaning}</p>
                    </div>
                    <div class="word-status ${w.learned ? 'learned' : 'new'}">${w.learned ? '✓' : ''}</div>
                </div>
            `).join('');
        }

        // ==================== 测试功能 ====================
        function startTest(type) {
            if (!currentLecture) {
                showToast('请先选择一讲课程');
                return;
            }
            const learned = words.filter(w => w.learned);
            if (learned.length < (type === 'choice' || type === 'chinese' ? 4 : 1)) {
                showToast('先学习一些单词吧！');
                return;
            }
            currentTest = {
                type: type,
                index: 0,
                words: learned.sort(() => Math.random() - 0.5).slice(0, Math.min(10, learned.length)),
                correct: 0,
                wrong: 0
            };
            document.getElementById('test-start').classList.add('hidden');
            document.getElementById('test-content').classList.remove('hidden');
            renderTest();
        }

        function renderTest() {
            const test = currentTest;
            if (test.index >= test.words.length) {
                const score = Math.round(test.correct / test.words.length * 100);
                if (score === 100) unlockAchievement('perfect');
                document.getElementById('test-content').innerHTML = `
                    <div class="result-score">${score}</div>
                    <div style="text-align:center;margin-bottom:20px;">
                        <span style="color:#07c160;">✓ ${test.correct}</span> /
                        <span style="color:#fa5151;">✗ ${test.wrong}</span>
                    </div>
                    <button class="btn btn-primary btn-full" onclick="resetTest()">再测一次</button>
                `;
                addPoints(Math.floor(score / 10), '测试完成');
                return;
            }
            const word = test.words[test.index];
            if (test.type === 'spell') {
                document.getElementById('test-content').innerHTML = `
                    <div style="text-align:center;color:#999;font-size:13px;margin-bottom:8px;">第 ${test.index+1} / ${test.words.length} 题</div>
                    <div style="font-size:22px;text-align:center;margin-bottom:20px;font-weight:500;">${word.meaning}</div>
                    <input type="text" id="spellInput" style="width:100%;padding:14px;font-size:18px;border:1px solid #ddd;border-radius:8px;margin-bottom:12px;" placeholder="输入单词或词组">
                    <button class="btn btn-primary btn-full" onclick="checkSpell('${word.word.replace(/'/g, "\\'")}')">提交</button>
                `;
                setTimeout(() => document.getElementById('spellInput').focus(), 100);
            } else {
                const options = getOptions(word, test.type);
                document.getElementById('test-content').innerHTML = `
                    <div style="text-align:center;color:#999;font-size:13px;margin-bottom:8px;">第 ${test.index+1} / ${test.words.length} 题</div>
                    <div style="font-size:22px;text-align:center;margin-bottom:20px;font-weight:500;">${test.type === 'choice' ? word.word : word.meaning}</div>
                    ${options.map(opt => `
                        <div class="test-option" onclick="checkAnswer(this, '${opt.replace(/'/g, "\\'")}', '${(test.type === 'choice' ? word.meaning : word.word).replace(/'/g, "\\'")}')">${opt}</div>
                    `).join('')}
                `;
            }
        }

        function getOptions(correctWord, type) {
            const correct = type === 'choice' ? correctWord.meaning : correctWord.word;
            const pool = words.filter(w => w.id !== correctWord.id);
            const options = [correct];
            while (options.length < 4 && pool.length > 0) {
                const idx = Math.floor(Math.random() * pool.length);
                const val = type === 'choice' ? pool[idx].meaning : pool[idx].word;
                if (!options.includes(val)) options.push(val);
                pool.splice(idx, 1);
            }
            return options.sort(() => Math.random() - 0.5);
        }

        function checkSpell(correct) {
            const input = document.getElementById('spellInput');
            const value = input ? input.value.trim().toLowerCase() : '';
            if (value === correct.toLowerCase()) {
                currentTest.correct++;
                addPoints(5, '拼写正确');
            } else {
                currentTest.wrong++;
                showToast('正确答案: ' + correct);
            }
            currentTest.index++;
            renderTest();
        }

        function checkAnswer(el, selected, correct) {
            document.querySelectorAll('.test-option').forEach(b => {
                b.style.pointerEvents = 'none';
                if (b.textContent === correct) b.classList.add('correct');
            });
            if (selected === correct) {
                currentTest.correct++;
                el.classList.add('correct');
                addPoints(5, '正确');
            } else {
                currentTest.wrong++;
                el.classList.add('wrong');
            }
            setTimeout(() => { currentTest.index++; renderTest(); }, 600);
        }

        function resetTest() {
            document.getElementById('test-start').classList.remove('hidden');
            document.getElementById('test-content').classList.add('hidden');
        }

        // ==================== 统计页 ====================
        function renderAchievements() {
            document.getElementById('achievements').innerHTML = achievementList.map(a =>
                `<div class="achievement ${userData.achievements.includes(a.id) ? 'unlocked' : ''}" title="${a.name}">${a.icon}</div>`
            ).join('');
        }

        function renderAllWordList() {
            let html = '';
            lectures.forEach(lec => {
                const ws = allWords[lec.id] || [];
                if (ws.length === 0) return;
                html += `<div style="padding:12px 14px 6px;font-size:14px;font-weight:600;color:#07c160;background:#f8f8f8;">第${lec.id}讲 · ${lec.title}</div>`;
                ws.forEach(w => {
                    html += `
                        <div class="word-item">
                            <div class="word-info">
                                <h4>${w.word}</h4>
                                <p>${w.meaning}</p>
                            </div>
                            <div class="word-status ${w.learned ? 'learned' : 'new'}">${w.learned ? '✓' : ''}</div>
                        </div>
                    `;
                });
            });
            if (!html) html = '<div style="padding:20px;text-align:center;color:#999;">暂无词汇数据</div>';
            document.getElementById('wordList').innerHTML = html;
        }

        // ==================== 成就 & 积分 ====================
        function unlockAchievement(id) {
            if (!userData.achievements.includes(id)) {
                userData.achievements.push(id);
                const ach = achievementList.find(a => a.id === id);
                addPoints(50, '解锁成就: ' + (ach ? ach.name : ''));
                renderAchievements();
            }
        }

        function addPoints(pts, reason) {
            userData.points += pts;
            saveUserData();
            updateStats();
            if (reason) showToast(reason + ' +' + pts);
        }

        // ==================== 重置 ====================
        function resetProgress() {
            if (!confirm('确定要重置所有学习进度吗？词汇数据不会删除。')) return;
            Object.keys(allWords).forEach(key => {
                allWords[key].forEach(w => {
                    w.learned = false;
                    w.level = 0;
                    w.nextReview = null;
                });
            });
            userData = { points: 0, streak: 0, lastStudyDate: null, achievements: [] };
            saveAll();
            updateStats();
            renderLectureList();
            renderAchievements();
            showToast('已重置');
        }

        // ==================== Toast ====================
        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }

        // ==================== 启动 ====================
        init();
    </script>
</body>
</html>
